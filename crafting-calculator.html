<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CuPa Crafting Calculator</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Tahoma,sans-serif;background:#1a1a2e;color:#e0e0e0;min-height:100vh;display:flex;flex-direction:column}
header{background:#16213e;padding:16px 24px;border-bottom:2px solid #0f3460;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
header h1{font-size:1.4rem;color:#e94560;white-space:nowrap}
.controls{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
.control-group{display:flex;flex-direction:column;gap:3px}
.control-group label{font-size:.7rem;text-transform:uppercase;letter-spacing:.05em;color:#8899aa}
select,input[type=number]{background:#0f3460;border:1px solid #334466;color:#e0e0e0;padding:6px 10px;border-radius:4px;font-size:.9rem}
select{min-width:160px;max-width:280px}
input[type=number]{width:70px}
select:focus,input:focus{outline:none;border-color:#e94560}
.checkbox-group{display:flex;align-items:center;gap:6px;margin-top:14px}
.checkbox-group label{font-size:.85rem;color:#aab}
main{flex:1;display:flex;gap:0;overflow:hidden}
.tree-panel{flex:1;overflow:auto;padding:20px 24px}
.summary-panel{width:300px;min-width:260px;background:#16213e;border-left:2px solid #0f3460;padding:20px;overflow:auto}
.summary-panel h2{font-size:1rem;color:#e94560;margin-bottom:12px;border-bottom:1px solid #334466;padding-bottom:8px}
.summary-row{display:flex;justify-content:space-between;padding:4px 0;font-size:.85rem;border-bottom:1px solid #1a1a2e}
.summary-row .mat-name{color:#ccd}
.summary-row .mat-qty{font-weight:600;color:#fff;min-width:30px;text-align:right}
.rarity-vc{color:#8a9a8a}
.rarity-c{color:#5cb85c}
.rarity-u{color:#5bc0de}
.rarity-r{color:#d4a}
.rarity-tag{font-size:.65rem;padding:1px 5px;border-radius:3px;font-weight:700;margin-left:6px;vertical-align:middle}
.rarity-tag.vc{background:#2a3a2a;color:#8a9a8a}
.rarity-tag.c{background:#1a3a1a;color:#5cb85c}
.rarity-tag.u{background:#1a2a3a;color:#5bc0de}
.rarity-tag.r{background:#2a1a2a;color:#d4a}
.wu-total{font-size:1.3rem;color:#e94560;font-weight:700;margin-bottom:8px}
.cost-est{font-size:.85rem;color:#aab;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid #334466}
.cost-est span{color:#fc6}

/* Tree styles */
.tree-root{padding-left:0}
.tree-node{position:relative;padding-left:24px}
.tree-node::before{content:'';position:absolute;left:8px;top:0;bottom:12px;width:1px;background:#334466}
.tree-node:last-child::before{bottom:auto;height:16px}
.tree-node::after{content:'';position:absolute;left:8px;top:16px;width:14px;height:1px;background:#334466}
.tree-root>.tree-node::before,.tree-root>.tree-node::after{display:none}
.tree-root>.tree-node{padding-left:0}
.node-row{display:inline-flex;align-items:center;gap:8px;padding:4px 10px;margin:2px 0;border-radius:4px;background:#16213e;border:1px solid #1f2f4f;cursor:default;white-space:nowrap}
.node-row:hover{border-color:#334466;background:#1a2540}
.node-qty{color:#fc6;font-weight:700;min-width:30px}
.node-name{color:#e0e0e0}
.node-wu{font-size:.75rem;color:#e94560;background:#2a1020;padding:1px 6px;border-radius:3px}
.node-surplus{font-size:.75rem;color:#8a9a8a;font-style:italic}
.node-raw .node-row{border-color:#2a3a2a;background:#121e12}
.node-children{padding-left:2px}
.node-root>.node-row{background:#2a1030;border-color:#e94560;font-size:1.05rem}
.node-root>.node-row .node-name{color:#fff;font-weight:600}

.empty-state{color:#556;font-size:1.1rem;margin-top:60px;text-align:center}

.calc-input{width:80px}
.calc-op{background:#0f3460;border:2px solid #334466;color:#e0e0e0;padding:8px 18px;border-radius:4px;font-size:1.1rem;cursor:pointer}
.calc-op:hover{border-color:#e94560;background:#1a2540}
.calc-op.selected{border-color:#e94560;background:#e94560;color:#fff}

.search-result{padding:6px 10px;cursor:pointer;font-size:.85rem;border-bottom:1px solid #1a1a2e}
.search-result:hover,.search-result.active{background:#0f3460}
.search-result .sr-name{color:#e0e0e0}
.search-result .sr-cat{color:#667;font-size:.75rem;margin-left:8px}
#txtSearch:focus{outline:none;border-color:#e94560}

@media(max-width:800px){
  main{flex-direction:column}
  .summary-panel{width:100%;border-left:none;border-top:2px solid #0f3460}
}
</style>
</head>
<body>
<header>
  <h1>CuPa Crafting Calculator</h1>
  <div class="controls">
    <div class="control-group" style="position:relative">
      <label>Search</label>
      <input type="text" id="txtSearch" placeholder="Type to search..." autocomplete="off" style="background:#0f3460;border:1px solid #334466;color:#e0e0e0;padding:6px 10px;border-radius:4px;font-size:.9rem;width:200px">
      <div id="searchResults" style="display:none;position:absolute;top:100%;left:0;z-index:100;background:#16213e;border:1px solid #334466;border-radius:4px;max-height:300px;overflow:auto;width:320px;margin-top:2px"></div>
    </div>
    <div class="control-group">
      <label>Type</label>
      <select id="selType"></select>
    </div>
    <div class="control-group">
      <label>Sub-category</label>
      <select id="selCategory"></select>
    </div>
    <div class="control-group">
      <label>Item</label>
      <select id="selItem"></select>
    </div>
    <div class="control-group">
      <label id="lblQty">Quantity</label>
      <input type="number" id="numQty" value="1" min="1" max="99">
    </div>
    <div class="control-group">
      <label>WU cost (cp)</label>
      <input type="number" id="numWuCost" value="2" min="0" step="1" max="99">
    </div>
    <div class="control-group" id="grpJewel" style="display:none">
      <label>Jewellery Metal</label>
      <select id="selJewel">
        <option value="Copper Metal">Copper</option>
        <option value="Silver Metal">Silver</option>
        <option value="Gold Metal">Gold</option>
      </select>
    </div>
    <div class="checkbox-group">
      <input type="checkbox" id="chkOrnate">
      <label for="chkOrnate">Ornate</label>
    </div>
    <div class="control-group" id="grpOrnate" style="display:none">
      <label>Finish</label>
      <select id="selOrnate"></select>
    </div>
    <div class="control-group" id="grpOrnateVariant" style="display:none">
      <label>Material</label>
      <select id="selOrnateVariant"></select>
    </div>
    <div class="checkbox-group">
      <input type="checkbox" id="chkCalc">
      <label for="chkCalc">Currency Calc</label>
    </div>
  </div>
</header>
<main>
  <div class="tree-panel" id="treePanel">
    <div class="empty-state">Select an item to see its crafting tree.</div>
  </div>
  <div class="summary-panel" id="summaryPanel">
    <h2>Summary</h2>
    <div id="summaryContent"><div class="empty-state" style="font-size:.9rem;margin-top:20px">No item selected.</div></div>
  </div>
</main>

<!-- Currency Calculator (hidden by default) -->
<div id="calcPanel" style="display:none;flex:1;padding:32px;overflow:auto">
  <div style="max-width:500px;margin:0 auto">
    <h2 style="color:#e94560;margin-bottom:20px">Currency Calculator</h2>
    <div style="display:flex;gap:12px;margin-bottom:16px;align-items:end">
      <div class="control-group"><label>Gold</label><input type="number" id="calcG1" value="0" min="0" class="calc-input"></div>
      <div class="control-group"><label>Silver</label><input type="number" id="calcS1" value="0" min="0" class="calc-input"></div>
      <div class="control-group"><label>Copper</label><input type="number" id="calcC1" value="0" min="0" class="calc-input"></div>
    </div>
    <div style="display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap">
      <button class="calc-op" data-op="+">+</button>
      <button class="calc-op" data-op="-">&minus;</button>
      <button class="calc-op" data-op="*">&times;</button>
      <button class="calc-op" data-op="/">&divide;</button>
    </div>
    <div id="calcRow2Currency" style="display:flex;gap:12px;margin-bottom:20px;align-items:end">
      <div class="control-group"><label>Gold</label><input type="number" id="calcG2" value="0" min="0" class="calc-input"></div>
      <div class="control-group"><label>Silver</label><input type="number" id="calcS2" value="0" min="0" class="calc-input"></div>
      <div class="control-group"><label>Copper</label><input type="number" id="calcC2" value="0" min="0" class="calc-input"></div>
    </div>
    <div id="calcRow2Number" style="display:none;margin-bottom:20px">
      <div class="control-group"><label>Amount</label><input type="number" id="calcNum" value="1" min="0" step="any" class="calc-input"></div>
    </div>
    <div style="border-top:2px solid #e94560;padding-top:16px">
      <div style="font-size:1.3rem;color:#fff;margin-bottom:8px" id="calcResultGSC">0g 0s 0c</div>
      <div style="font-size:1rem;color:#fc6" id="calcResultS">(0s)</div>
    </div>
  </div>
</div>

<script>
// ============================================================
//  RARITY DATA
// ============================================================
const RARITY = {
  'Timber':'VC','Hide':'VC','Ore':'VC','Sand':'VC','Rock':'VC','Fleece':'VC',
  'Wax':'VC','Clay':'VC','Chalk':'VC',

  'Copper Ore':'U','Gold Ore':'U','Silver Ore':'U',
  'Gem (any)':'U',
  'Cold Iron Ore':'R','Platinum Ore':'R',
  // Passive

  'Bone (H)':'U','Cloth (H)':'U','Glass (H)':'U','Leather (H)':'U',

  'Metal Wire':'U','Copper Wire':'R','Silver Wire':'R','Gold Wire':'R',

  'Essence of Cayenne':'U','Essence of Lotus Leaves':'U','Essence of Yellow Fungus':'U',
  // Specific herbs (all C)
  'Abscess Root':'C','Acacia':'C','Acorn':'C','Agaric':'C','Agrimony':'C',
  'Amaranth':'C','Belladonna':'C','Benne':'C','Beth Root':'C',
  'Black Horehound':'C','Black Mushroom Powder':'C','Box Leaves':'C',
  'Cayenne':'C','Chokeweed':'C','Colewort':'C','Comfrey':'C',
  'Cumin Seeds':'C','Digitalis':'C','Fenugreek':'C','Fireweed':'C',
  'Gelsemium':'C','Gentian':'C','Hawthorn':'C','Hemlock':'C',
  'Hyssop':'C','Jambul Seeds':'C','Lotus Leaves':'C','Lucerne':'C',
  'Lycopodium':'C','Marjoram':'C','Master Wort':'C','Mistletoe':'C',
  'Moonflower Seeds':'C','Muira Puama':'C','Nux Vomica':'C',
  'Oidium Sano':'C','Rosemary':'C','Scarlet Radish':'C','Scopolia':'C',
  'Skullcap':'C','Spider Venom':'C','Spikenard':'C','Stag Horn':'C',
  'Sweet Geranium':'C','Viper Venom':'C','White Bryony':'C',
  'Yellow Fungus':'C',
  // Specific gems (all U)
  'Blue Agate':'U','Crimson Quartz':'U','Green Agate':'U','Navy Quartz':'U',
  'Red Agate':'U','Sage Quartz':'U',
  // Surgery
  'Claw':'C','Bandage':'C',
};

// Price in copper per unit (4c = 1s, 4s = 1g)
const PRICE_COPPER = { 'VC': 8/9, 'C': 8/3, 'U': 8, 'R': 24 };

// ============================================================
//  MATERIAL RECIPES  (intermediate conversions)
// ============================================================
const MAT = {
  // Passive ingredients (yield 3)
  'Cream':     {i:{'Oil':1}, y:3, wu:1},
  'Fluid':     {i:{'Oil':1}, y:3, wu:1},
  'Ink':       {i:{'Charcoal':1}, y:3, wu:1},
  'Oil':       {i:{'Herb (any)':1}, y:3, wu:1},
  'Powder':    {i:{'Herb (any)':1}, y:3, wu:1},
  'Powdered Dye':{i:{'Herb (any)':1}, y:3, wu:1},
  // Passive materials (yield 3)
  'Ash':       {i:{'Timber':1}, y:3, wu:1},
  'Charcoal':  {i:{'Timber':1}, y:3, wu:1},
  'Powdered Bone':    {i:{'Bone (O)':1}, y:3, wu:1},
  'Powdered Gemstone':{i:{'Gem (any)':1}, y:3, wu:1},
  'Powdered Metal':   {i:{'Metal (O)':1}, y:3, wu:1},
  // Finished materials (yield 1)
  'Bone (O)':   {i:{'Body Part':1,'Sand':1}, y:1, wu:1},
  'Bone (H)':   {i:{'Body Part':3,'Sand':1}, y:1, wu:3},
  'Cloth (O)':  {i:{'Fleece':1,'Fluid':1}, y:1, wu:1},
  'Cloth (H)':  {i:{'Fleece':3,'Fluid':1}, y:1, wu:3},

  'Glass (H)':  {i:{'Sand':3,'Charcoal':1}, y:1, wu:3},
  'Leather (O)':{i:{'Hide':1,'Cream':1}, y:1, wu:1},
  'Leather (H)':{i:{'Hide':3,'Cream':1}, y:1, wu:3},
  'Metal (O)':  {i:{'Ore':1,'Charcoal':1}, y:1, wu:1},
  'Metal (H)':  {i:{'Ore':3,'Charcoal':1}, y:1, wu:3},
  'Paper (O)':  {i:{'Timber':1,'Fluid':1}, y:1, wu:1},
  'Paper (H)':  {i:{'Timber':3,'Fluid':1}, y:1, wu:3},
  'Stone (O)':  {i:{'Rock':1,'Sand':1}, y:1, wu:1},
  'Stone (H)':  {i:{'Rock':3,'Sand':1}, y:1, wu:3},
  'Wood (O)':   {i:{'Timber':1,'Fluid':1}, y:1, wu:1},
  'Wood (H)':   {i:{'Timber':3,'Fluid':1}, y:1, wu:3},
  // Jewellery metals
  'Copper Metal':{i:{'Copper Ore':1,'Charcoal':1}, y:1, wu:9},
  'Gold Metal':  {i:{'Gold Ore':1,'Charcoal':1}, y:1, wu:9},
  'Silver Metal':{i:{'Silver Ore':1,'Charcoal':1}, y:1, wu:9},
  'Lead Metal':  {i:{'Lead Ore':1,'Charcoal':1}, y:1, wu:3},
  'Nickel Metal':{i:{'Nickel Ore':1,'Charcoal':1}, y:1, wu:3},
  'Tin Metal':   {i:{'Tin Ore':1,'Charcoal':1}, y:1, wu:3},
  // Wire (yield 3)
  'Metal Wire':  {i:{'Metal (H)':1,'Charcoal':1}, y:3, wu:1},
  'Copper Wire': {i:{'Copper Metal':1,'Charcoal':1}, y:3, wu:3},
  'Gold Wire':   {i:{'Gold Metal':1,'Charcoal':1}, y:3, wu:3},
  'Silver Wire': {i:{'Silver Metal':1,'Charcoal':1}, y:3, wu:3},
  'Lead Wire':   {i:{'Lead Metal':1,'Charcoal':1}, y:3, wu:3},
  'Nickel Wire': {i:{'Nickel Metal':1,'Charcoal':1}, y:3, wu:3},
  'Tin Wire':    {i:{'Tin Metal':1,'Charcoal':1}, y:3, wu:3},

  // Adept workshops (used as inputs to upgrade recipes)
  'Adept Artisan\'s Workshop':     {i:{'Metal (H)':2,'Metal (O)':5,'Wood (O)':2,'Charcoal':7,'Oil':2}, y:1, wu:40},
  'Adept Blacksmith\'s Forge':     {i:{'Metal (H)':2,'Metal (O)':5,'Wood (O)':2,'Charcoal':7,'Oil':2}, y:1, wu:40},

  'Adept Alchemist\'s Laboratory': {i:{'Metal (H)':2,'Glass (H)':4,'Wood (O)':2,'Charcoal':6,'Oil':2}, y:1, wu:40},
  'Adept Surgeon\'s Bed':          {i:{'Metal (H)':1,'Metal (O)':3,'Cloth (O)':3,'Wood (O)':2,'Charcoal':4,'Oil':2}, y:1, wu:40},
  'Essence':     {i:{'Herb (any)':3,'Oil':1}, y:1, wu:1},
  'Essence of Agaric':      {i:{'Agaric':3,'Oil':1}, y:1, wu:1},
  'Essence of Amaranth':    {i:{'Amaranth':3,'Oil':1}, y:1, wu:1},
  'Essence of Fireweed':    {i:{'Fireweed':3,'Oil':1}, y:1, wu:1},
  'Essence of Cayenne':     {i:{'Cayenne':3,'Oil':1}, y:1, wu:1},
  'Essence of Lotus Leaves':{i:{'Lotus Leaves':3,'Oil':1}, y:1, wu:1},
  'Essence of Yellow Fungus':{i:{'Yellow Fungus':3,'Oil':1}, y:1, wu:1},
  'Chymos':      {i:{'Blood':1}, y:1, wu:1},
  'Cruor':       {i:{'Blood':1}, y:1, wu:1},
  'Ichor':       {i:{'Blood':1}, y:1, wu:1},

// ============================================================
//  CRAFTING DESIGNS
//  Each: { i:{material:qty,...}, wu:N, y:yield(default 1),
//          cat:ornateCategory, size:'s'|'l'|'loc',
//          jewel:bool, plateLeather:bool }
// ============================================================
const D = {};
function add(cat, name, props) {
  if(!D[cat]) D[cat]=[];
  props.cat = props.cat||cat;
  D[cat].push({name, ...props});
}

// --- ARMOUR - LIGHT (per location) ---
add('Armour - Light','Padded Cloth Armour',{i:{'Cloth (H)':4},wu:16,size:'loc',ocat:'armour'});
add('Armour - Light','Hide Armour',{i:{'Hide':12},wu:18,size:'loc',ocat:'armour'});

// --- ARMOUR STAPLES ---

// --- CLOTHING SMALL STANDARD ---

add('Clothing - Small (Std)','Mask/Headband (wood)',{i:{'Wood (O)':1,'Oil':1},wu:2,size:'s',ocat:'clothing'});
add('Clothing - Small (Std)','Sash',{i:{'Cloth (O)':1},wu:3,size:'s',ocat:'clothing'});
add('Clothing - Small (Std)','Shoes',{i:{'Leather (O)':1,'Oil':1},wu:2,size:'s',ocat:'clothing'});

// --- CLOTHING SMALL MASTERCRAFTED ---
add('Clothing - Small (MC)','MC Boots',{i:{'Leather (H)':3,'Oil':3},wu:14,size:'s',ocat:'clothing'});
add('Clothing - Small (MC)','MC Gloves/Bracers (cloth)',{i:{'Cloth (H)':2,'Oil':2},wu:7,size:'s',ocat:'clothing'});
add('Clothing - Small (MC)','MC Gloves/Bracers (leather)',{i:{'Leather (H)':2,'Oil':2},wu:7,size:'s',ocat:'clothing'});

const selType = document.getElementById('selType');
const selCat = document.getElementById('selCategory');
const selItem = document.getElementById('selItem');
const numQty = document.getElementById('numQty');
const lblQty = document.getElementById('lblQty');
const chkOrnate = document.getElementById('chkOrnate');
const selOrnate = document.getElementById('selOrnate');
const grpOrnate = document.getElementById('grpOrnate');
const grpJewel = document.getElementById('grpJewel');
const selJewel = document.getElementById('selJewel');
const grpOrnateVariant = document.getElementById('grpOrnateVariant');
const selOrnateVariant = document.getElementById('selOrnateVariant');
const treePanel = document.getElementById('treePanel');
const summaryContent = document.getElementById('summaryContent');

// Populate types
Object.keys(TYPES).forEach(t => {
  const o = document.createElement('option');
  o.value = t; o.textContent = t;
  selType.appendChild(o);
});

function toggleCalc() {
  const isCalc = document.getElementById('chkCalc').checked;
  document.getElementById('calcPanel').style.display = isCalc ? 'flex' : 'none';
  document.querySelector('main').style.display = isCalc ? 'none' : '';
}

document.getElementById('chkCalc').addEventListener('change', toggleCalc);

function populateCategories() {
  selCat.innerHTML = '';
  const cats = TYPES[selType.value] || [];
  cats.forEach(c => {
    if(!D[c]) return;
    const o = document.createElement('option');
    o.value = c;
    o.textContent = c;
    selCat.appendChild(o);
  });
  populateItems();
}

function populateItems() {
  selItem.innerHTML = '';
  const items = D[selCat.value] || [];
  items.forEach((it,idx) => {
    const o = document.createElement('option');
    o.value = idx; o.textContent = it.name;
    selItem.appendChild(o);
  });
  updateUI();
}

function getSelectedDesign() {
  const items = D[selCat.value];
  if(!items) return null;
  return items[selItem.value] || null;
}

function updateUI() {
  const design = getSelectedDesign();
  if(!design) return;

  // Show/hide location label
  lblQty.textContent = design.size === 'loc' ? 'Locations' : 'Quantity';

  // Ornate availability
  const hasOrnate = !!design.ocat && !!ORNATE_DEFS[design.ocat];
  chkOrnate.parentElement.style.display = hasOrnate ? '' : 'none';
  if(!hasOrnate) chkOrnate.checked = false;
  updateOrnateOptions();

  // Jewellery metal
  updateJewelVisibility();

  rebuildTree();
}

function updateOrnateOptions() {
  const design = getSelectedDesign();
  if(!design || !chkOrnate.checked || !design.ocat) {
    grpOrnate.style.display = 'none';
    grpOrnateVariant.style.display = 'none';
    return;
  }
  const defs = ORNATE_DEFS[design.ocat] || [];
  grpOrnate.style.display = '';
  selOrnate.innerHTML = '';
  defs.forEach((d,i) => {
    const o = document.createElement('option');
    o.value = i; o.textContent = d.name;
    selOrnate.appendChild(o);
  });
  grpOrnateVariant.style.display = 'none';
}

function updateJewelVisibility() {
  const design = getSelectedDesign();
  let needsJewel = design && design.jewel;
  if(chkOrnate.checked && design && design.ocat) {
    const defs = ORNATE_DEFS[design.ocat] || [];
    const orn = defs[selOrnate.value];
    if(orn && orn.jewel) needsJewel = true;
  }
  grpJewel.style.display = needsJewel ? '' : 'none';
}

selType.addEventListener('change', () => { ownedItems.clear(); populateCategories(); });
selCat.addEventListener('change', () => { ownedItems.clear(); populateItems(); });
selItem.addEventListener('change', () => { ownedItems.clear(); updateUI(); });
numQty.addEventListener('input', rebuildTree);
chkOrnate.addEventListener('change', () => { updateOrnateOptions(); updateJewelVisibility(); rebuildTree(); });
selOrnate.addEventListener('change', () => { updateJewelVisibility(); rebuildTree(); });
selJewel.addEventListener('change', rebuildTree);
document.getElementById('numWuCost').addEventListener('input', rebuildTree);

const txtSearch = document.getElementById('txtSearch');
const searchResults = document.getElementById('searchResults');

// Build flat index of all items
const allItems = [];
for(const [typeName, cats] of Object.entries(TYPES)) {
  for(const cat of cats) {
    const items = D[cat] || [];
    items.forEach((item, idx) => {
      allItems.push({ name: item.name, type: typeName, cat, idx });
    });
  }
}

let searchActive = false;
let activeResultIdx = -1;

txtSearch.addEventListener('input', () => {
  const q = txtSearch.value.trim().toLowerCase();
  if(!q) {
    searchResults.style.display = 'none';
    searchActive = false;
    activeResultIdx = -1;
    return;
  }
  const matches = allItems.filter(it => it.name.toLowerCase().includes(q));
  if(matches.length === 0) {
    searchResults.innerHTML = '<div style="padding:8px;color:#667">No results</div>';
    searchResults.style.display = '';
    searchActive = true;
    return;
  }
  searchResults.innerHTML = '';
  matches.slice(0, 20).forEach((m, i) => {
    const div = document.createElement('div');
    div.className = 'search-result';
    div.innerHTML = '<span class="sr-name">' + m.name + '</span><span class="sr-cat">' + m.cat + '</span>';
    div.addEventListener('click', () => selectSearchResult(m));
    searchResults.appendChild(div);
  });
  searchResults.style.display = '';
  searchActive = true;
  activeResultIdx = -1;
});

txtSearch.addEventListener('keydown', (e) => {
  if(!searchActive) return;
  const items = searchResults.querySelectorAll('.search-result');
  if(e.key === 'ArrowDown') {
    e.preventDefault();
    activeResultIdx = Math.min(activeResultIdx + 1, items.length - 1);
    items.forEach((el, i) => el.classList.toggle('active', i === activeResultIdx));
  } else if(e.key === 'ArrowUp') {
    e.preventDefault();
    activeResultIdx = Math.max(activeResultIdx - 1, 0);
    items.forEach((el, i) => el.classList.toggle('active', i === activeResultIdx));
  } else if(e.key === 'Enter' && activeResultIdx >= 0) {
    e.preventDefault();
    const q = txtSearch.value.trim().toLowerCase();
    const matches = allItems.filter(it => it.name.toLowerCase().includes(q));
    if(matches[activeResultIdx]) selectSearchResult(matches[activeResultIdx]);
  } else if(e.key === 'Escape') {
    searchResults.style.display = 'none';
    searchActive = false;
  }
});

document.addEventListener('click', (e) => {
  if(!txtSearch.contains(e.target) && !searchResults.contains(e.target)) {
    searchResults.style.display = 'none';
    searchActive = false;
  }
});

function selectSearchResult(m) {
  ownedItems.clear();
  // Set the type, category, and item dropdowns to match
  selType.value = m.type;
  populateCategories();
  selCat.value = m.cat;
  populateItems();
  selItem.value = m.idx;
  updateUI();
  // Close search
  searchResults.style.display = 'none';
  searchActive = false;
  txtSearch.value = m.name;
}

// ============================================================
//  TREE COMPUTATION
// ============================================================
function resolveJewel(inputs) {
  const resolved = {};
  const jewelType = selJewel.value;
  for(const [k,v] of Object.entries(inputs)) {
    if(k === '@jewel') resolved[jewelType] = (resolved[jewelType]||0) + v;
    else resolved[k] = (resolved[k]||0) + v;
  }
  return resolved;
}

// Owned items - user has these, skip the sub-tree (resets on reload)
const ownedItems = new Set();

function buildTree(name, needed, path) {
  // Owned: treat as leaf, no WU, not counted as raw
  if(ownedItems.has(path)) {
    return { name, needed, produced: needed, surplus:0, wu:0, isRaw:false, isOwned:true, path, children:[] };
  }
  const recipe = MAT[name];
  if(!recipe) {
    return { name, needed, produced: needed, surplus:0, wu:0, isRaw:true, path, children:[] };
  }
  const batches = Math.ceil(needed / recipe.y);
  const produced = batches * recipe.y;
  const surplus = produced - needed;
  const wu = recipe.wu * batches;
  const children = [];
  let i = 0;
  for(const [mat, qtyPer] of Object.entries(recipe.i)) {
    children.push(buildTree(mat, qtyPer * batches, path + '.' + i));
    i++;
  }
  return { name, needed, produced, surplus, wu, batches, isRaw:false, path, children };
}

function buildDesignTree() {
  const design = getSelectedDesign();
  if(!design) return null;

  const qty = Math.max(1, parseInt(numQty.value)||1);
  const itemYield = design.y || 1;
  const batches = Math.ceil(qty / itemYield);
  const produced = batches * itemYield;
  const surplus = produced - qty;

  // Resolve inputs with jewellery metal substitution
  let inputs = resolveJewel(design.i);

  // Scale by batches (and by locations for armour)
  // For per-loc items, qty IS the number of locations
  const scaledInputs = {};
  for(const [k,v] of Object.entries(inputs)) {
    scaledInputs[k] = v * batches;
  }

  // Plate leather (fixed cost)
  if(design.plateLeather && batches > 0) {
    scaledInputs['Leather (O)'] = (scaledInputs['Leather (O)']||0) + 1;
  }

  // Ornate additions
  let ornateWuExtra = 0;
  if(chkOrnate.checked && design.ocat) {
    const defs = ORNATE_DEFS[design.ocat] || [];
    const orn = defs[selOrnate.value];
    if(orn) {
      // WU multiplier applies to the base assembly WU
      const baseWu = design.wu * batches;
      ornateWuExtra = Math.ceil(baseWu * (orn.wuMult - 1));

      // Ornate materials: per location for armour, per item otherwise
      // Large items double ornate materials for clothing/common/weapon
      let ornScale = batches;
      if(design.size === 'l' && (design.ocat === 'clothing' || design.ocat === 'common' || design.ocat === 'weapon')) {
        ornScale = batches * 2;
      }
      const ornInputs = resolveJewel(orn.i);
      for(const [k,v] of Object.entries(ornInputs)) {
        scaledInputs[k] = (scaledInputs[k]||0) + v * ornScale;
      }
    }
  }

  const assemblyWu = design.wu * batches + ornateWuExtra;

  // Build children trees for each input
  const children = [];
  let ci = 0;
  for(const [mat, total] of Object.entries(scaledInputs)) {
    children.push(buildTree(mat, total, 'r.' + ci));
    ci++;
  }

  return {
    name: design.name + (produced > 1 ? '' : ''),
    needed: qty,
    produced,
    surplus,
    wu: assemblyWu,
    isRaw: false,
    isRoot: true,
    children
  };
}

// ============================================================
//  SUMMARY (aggregate raw materials + total WU)
// ============================================================
function collectRaw(node, raws, totalWu, surpluses) {
  totalWu.v += node.wu;
  if(node.isRaw) {
    raws[node.name] = (raws[node.name]||0) + node.needed;
  }
  if(node.surplus > 0) {
    surpluses[node.name] = (surpluses[node.name]||0) + node.surplus;
  }
  for(const c of node.children) collectRaw(c, raws, totalWu, surpluses);
}

function formatCurrency(copper) {
  const g = Math.floor(copper / 16);
  const rem = copper % 16;
  const s = Math.floor(rem / 4);
  const c = rem % 4;
  let parts = [];
  if(g) parts.push(g + 'g');
  if(s) parts.push(s + 's');
  if(c) parts.push(Math.round(c*10)/10 + 'c');
  return parts.join(' ') || '0c';
}

// ============================================================
//  RENDERING
// ============================================================
function renderNode(node, isLast) {
  const div = document.createElement('div');
  div.className = 'tree-node' + (node.isRaw ? ' node-raw' : '') + (node.isRoot ? ' node-root' : '') + (node.isOwned ? ' node-owned' : '');

  const row = document.createElement('div');
  row.className = 'node-row';
  if(!node.isRoot) {
    row.style.cursor = 'pointer';
    row.title = node.isOwned ? 'Click to unmark as owned' : 'Click to mark as owned (skip pre-reqs)';
    row.addEventListener('click', () => {
      if(ownedItems.has(node.path)) ownedItems.delete(node.path);
      else ownedItems.add(node.path);
      rebuildTree();
    });
  }

  if(node.isOwned) {
    const check = document.createElement('span');
    check.textContent = '\u2713';
    check.style.color = '#5cb85c';
    check.style.fontWeight = '700';
    row.appendChild(check);
  }

  const qtySpan = document.createElement('span');
  qtySpan.className = 'node-qty';
  qtySpan.textContent = node.needed + '\u00d7';
  row.appendChild(qtySpan);

  const nameSpan = document.createElement('span');
  nameSpan.className = 'node-name';
  nameSpan.textContent = node.name;
  if(node.isOwned) nameSpan.style.textDecoration = 'line-through';
  row.appendChild(nameSpan);

  // Rarity tag
  const r = RARITY[node.name];
  if(r) {
    const tag = document.createElement('span');
    tag.className = 'rarity-tag ' + r.toLowerCase();
    tag.textContent = r;
    row.appendChild(tag);
  }

  if(node.isOwned) {
    const owned = document.createElement('span');
    owned.style.fontSize = '.75rem';
    owned.style.color = '#5cb85c';
    owned.style.fontStyle = 'italic';
    owned.textContent = 'have it';
    row.appendChild(owned);
  }

  if(!node.isRaw && !node.isOwned && node.wu > 0) {
    const wuSpan = document.createElement('span');
    wuSpan.className = 'node-wu';
    wuSpan.textContent = node.wu + ' WU';
    row.appendChild(wuSpan);
  }

  if(node.surplus > 0) {
    const surp = document.createElement('span');
    surp.className = 'node-surplus';
    surp.textContent = '(+' + node.surplus + ' surplus)';
    row.appendChild(surp);
  }

  div.appendChild(row);

  if(node.children.length > 0) {
    const childContainer = document.createElement('div');
    childContainer.className = 'node-children';
    node.children.forEach((c,i) => {
      childContainer.appendChild(renderNode(c, i === node.children.length - 1));
    });
    div.appendChild(childContainer);
  }

  return div;
}

function rebuildTree() {
  const tree = buildDesignTree();
  if(!tree) {
    treePanel.innerHTML = '<div class="empty-state">Select an item to see its crafting tree.</div>';
    summaryContent.innerHTML = '<div class="empty-state" style="font-size:.9rem;margin-top:20px">No item selected.</div>';
    return;
  }

  // Render tree
  treePanel.innerHTML = '';
  const root = document.createElement('div');
  root.className = 'tree-root';
  root.appendChild(renderNode(tree));
  treePanel.appendChild(root);

  // Render summary
  const raws = {};
  const totalWu = {v:0};
  const surpluses = {};
  collectRaw(tree, raws, totalWu, surpluses);

  let html = '<div class="wu-total">' + totalWu.v + ' Total WU</div>';

  // Estimate cost
  let totalCopper = 0;
  let hasUnknown = false;
  for(const [name, qty] of Object.entries(raws)) {
    const r = RARITY[name];
    if(r && PRICE_COPPER[r]) {
      totalCopper += qty * PRICE_COPPER[r];
    } else {
      hasUnknown = true;
    }
  }
  const fmtCost = (copper) => {
    const cg = Math.floor(copper / 16);
    const cs = (copper % 16) / 4;
    let s = '';
    if(cg > 0) s += cg + 'g ';
    s += parseFloat(cs.toFixed(2)) + 's';
    const totalSilver = (copper / 4);
    s += ' (' + parseFloat(totalSilver.toFixed(2)) + 's)';
    return s;
  };
  html += '<div class="cost-est">Est. material cost: <span>' + fmtCost(totalCopper) + '</span>';
  if(hasUnknown) html += ' <span style="color:#e94560">(+ unknown)</span>';
  html += '</div>';

  // Raw materials list sorted by rarity
  const rarityOrder = {'R':0,'U':1,'C':2,'VC':3};
  const sorted = Object.entries(raws).sort((a,b) => {
    const ra = rarityOrder[RARITY[a[0]]] ?? 2;
    const rb = rarityOrder[RARITY[b[0]]] ?? 2;
    return ra - rb || a[0].localeCompare(b[0]);
  });

  // WU cost estimate
  const wuRate = parseFloat(document.getElementById('numWuCost').value) || 2;
  const wuCopper = totalWu.v * wuRate;
  const totalEstCopper = totalCopper + wuCopper;

  html += '<div class="cost-est">Est. WU cost: <span>' + fmtCost(wuCopper) + '</span> (' + totalWu.v + ' WU @ ' + wuRate + 'c each)</div>';
  html += '<div class="cost-est" style="font-size:1rem;font-weight:700">Total est. cost: <span style="font-size:1.1rem">' + fmtCost(totalEstCopper) + '</span>';
  if(hasUnknown) html += ' <span style="color:#e94560">(+ unknown)</span>';
  html += '</div>';

  html += '<h2 style="margin-top:8px">Raw Materials</h2>';
  for(const [name, qty] of sorted) {
    const r = RARITY[name];
    const rc = r ? 'rarity-' + r.toLowerCase() : '';
    html += '<div class="summary-row"><span class="mat-name ' + rc + '">' + name;
    if(r) html += ' <span class="rarity-tag ' + r.toLowerCase() + '">' + r + '</span>';
    html += '</span><span class="mat-qty">' + qty + '</span></div>';
  }

  // Surplus section
  const surplusEntries = Object.entries(surpluses).sort((a,b) => a[0].localeCompare(b[0]));
  if(surplusEntries.length > 0) {
    html += '<h2 style="margin-top:16px">Surplus Created</h2>';
    for(const [name, qty] of surplusEntries) {
      const r = RARITY[name];
      const rc = r ? 'rarity-' + r.toLowerCase() : '';
      html += '<div class="summary-row"><span class="mat-name ' + rc + '">+' + qty + ' ' + name;
      if(r) html += ' <span class="rarity-tag ' + r.toLowerCase() + '">' + r + '</span>';
      html += '</span></div>';
    }
  }

  summaryContent.innerHTML = html;
}

// ============================================================
//  CURRENCY CALCULATOR
// ============================================================
let calcOp = '+';
document.querySelectorAll('.calc-op').forEach(btn => {
  btn.addEventListener('click', () => {
    calcOp = btn.dataset.op;
    document.querySelectorAll('.calc-op').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    const isNum = calcOp === '*' || calcOp === '/';
    document.getElementById('calcRow2Currency').style.display = isNum ? 'none' : 'flex';
    document.getElementById('calcRow2Number').style.display = isNum ? '' : 'none';
    updateCalc();
  });
});
// Default select +
document.querySelector('.calc-op[data-op="+"]').classList.add('selected');

function toCopper(g, s, c) {
  return (g * 16) + (s * 4) + c;
}

function fromCopper(copper) {
  const neg = copper < 0;
  let c = Math.abs(copper);
  const g = Math.floor(c / 16);
  c -= g * 16;
  const s = Math.floor(c / 4);
  c -= s * 4;
  // Round to avoid floating point noise
  c = parseFloat(c.toFixed(2));
  const prefix = neg ? '-' : '';
  let parts = [];
  if(g) parts.push(g + 'g');
  if(s) parts.push(s + 's');
  if(c || parts.length === 0) parts.push(c + 'c');
  return prefix + parts.join(' ');
}

function updateCalc() {
  const g1 = parseFloat(document.getElementById('calcG1').value) || 0;
  const s1 = parseFloat(document.getElementById('calcS1').value) || 0;
  const c1 = parseFloat(document.getElementById('calcC1').value) || 0;
  const a = toCopper(g1, s1, c1);

  let result;
  if(calcOp === '*' || calcOp === '/') {
    const n = parseFloat(document.getElementById('calcNum').value) || 0;
    result = calcOp === '*' ? a * n : (n !== 0 ? a / n : 0);
  } else {
    const g2 = parseFloat(document.getElementById('calcG2').value) || 0;
    const s2 = parseFloat(document.getElementById('calcS2').value) || 0;
    const c2 = parseFloat(document.getElementById('calcC2').value) || 0;
    const b = toCopper(g2, s2, c2);
    result = calcOp === '+' ? a + b : a - b;
  }

  document.getElementById('calcResultGSC').textContent = fromCopper(result);
  const totalS = parseFloat((result / 4).toFixed(2));
  document.getElementById('calcResultS').textContent = '(' + totalS + 's)';
}

document.querySelectorAll('.calc-input').forEach(el => {
  el.addEventListener('input', updateCalc);
});

// Initialize
populateCategories();
</script>
