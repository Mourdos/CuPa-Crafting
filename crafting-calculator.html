<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CuPa Crafting Calculator</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Tahoma,sans-serif;background:#1a1a2e;color:#e0e0e0;min-height:100vh;display:flex;flex-direction:column}
header{background:#16213e;padding:16px 24px;border-bottom:2px solid #0f3460;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
header h1{font-size:1.4rem;color:#e94560;white-space:nowrap}
.controls{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
.control-group{display:flex;flex-direction:column;gap:3px}
.control-group label{font-size:.7rem;text-transform:uppercase;letter-spacing:.05em;color:#8899aa}
select,input[type=number]{background:#0f3460;border:1px solid #334466;color:#e0e0e0;padding:6px 10px;border-radius:4px;font-size:.9rem}
select{min-width:160px;max-width:280px}
input[type=number]{width:70px}
select:focus,input:focus{outline:none;border-color:#e94560}
.checkbox-group{display:flex;align-items:center;gap:6px;margin-top:14px}
.checkbox-group label{font-size:.85rem;color:#aab}
main{flex:1;display:flex;gap:0;overflow:hidden}
.tree-panel{flex:1;overflow:auto;padding:20px 24px}
.summary-panel{width:300px;min-width:260px;background:#16213e;border-left:2px solid #0f3460;padding:20px;overflow:auto}
.summary-panel h2{font-size:1rem;color:#e94560;margin-bottom:12px;border-bottom:1px solid #334466;padding-bottom:8px}
.summary-row{display:flex;justify-content:space-between;padding:4px 0;font-size:.85rem;border-bottom:1px solid #1a1a2e}
.summary-row .mat-name{color:#ccd}
.summary-row .mat-qty{font-weight:600;color:#fff;min-width:30px;text-align:right}
.rarity-vc{color:#8a9a8a}
.rarity-c{color:#5cb85c}
.rarity-u{color:#5bc0de}
.rarity-r{color:#d4a}
.rarity-tag{font-size:.65rem;padding:1px 5px;border-radius:3px;font-weight:700;margin-left:6px;vertical-align:middle}
.rarity-tag.vc{background:#2a3a2a;color:#8a9a8a}
.rarity-tag.c{background:#1a3a1a;color:#5cb85c}
.rarity-tag.u{background:#1a2a3a;color:#5bc0de}
.rarity-tag.r{background:#2a1a2a;color:#d4a}
.wu-total{font-size:1.3rem;color:#e94560;font-weight:700;margin-bottom:8px}
.cost-est{font-size:.85rem;color:#aab;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid #334466}
.cost-est span{color:#fc6}

/* Tree styles */
.tree-root{padding-left:0}
.tree-node{position:relative;padding-left:24px}
.tree-node::before{content:'';position:absolute;left:8px;top:0;bottom:12px;width:1px;background:#334466}
.tree-node:last-child::before{bottom:auto;height:16px}
.tree-node::after{content:'';position:absolute;left:8px;top:16px;width:14px;height:1px;background:#334466}
.tree-root>.tree-node::before,.tree-root>.tree-node::after{display:none}
.tree-root>.tree-node{padding-left:0}
.node-row{display:inline-flex;align-items:center;gap:8px;padding:4px 10px;margin:2px 0;border-radius:4px;background:#16213e;border:1px solid #1f2f4f;cursor:default;white-space:nowrap}
.node-row:hover{border-color:#334466;background:#1a2540}
.node-qty{color:#fc6;font-weight:700;min-width:30px}
.node-name{color:#e0e0e0}
.node-wu{font-size:.75rem;color:#e94560;background:#2a1020;padding:1px 6px;border-radius:3px}
.node-surplus{font-size:.75rem;color:#8a9a8a;font-style:italic}
.node-raw .node-row{border-color:#2a3a2a;background:#121e12}
.node-children{padding-left:2px}
.node-root>.node-row{background:#2a1030;border-color:#e94560;font-size:1.05rem}
.node-root>.node-row .node-name{color:#fff;font-weight:600}

.empty-state{color:#556;font-size:1.1rem;margin-top:60px;text-align:center}

@media(max-width:800px){
  main{flex-direction:column}
  .summary-panel{width:100%;border-left:none;border-top:2px solid #0f3460}
}
</style>
</head>
<body>
<header>
  <h1>CuPa Crafting Calculator</h1>
  <div class="controls">
    <div class="control-group">
      <label>Type</label>
      <select id="selType"></select>
    </div>
    <div class="control-group">
      <label>Sub-category</label>
      <select id="selCategory"></select>
    </div>
    <div class="control-group">
      <label>Item</label>
      <select id="selItem"></select>
    </div>
    <div class="control-group">
      <label id="lblQty">Quantity</label>
      <input type="number" id="numQty" value="1" min="1" max="99">
    </div>
    <div class="control-group">
      <label>WU cost (cp)</label>
      <input type="number" id="numWuCost" value="2" min="0" step="0.5" max="99">
    </div>
    <div class="control-group" id="grpJewel" style="display:none">
      <label>Jewellery Metal</label>
      <select id="selJewel">
        <option value="Copper Metal">Copper</option>
        <option value="Silver Metal">Silver</option>
        <option value="Gold Metal">Gold</option>
      </select>
    </div>
    <div class="checkbox-group">
      <input type="checkbox" id="chkOrnate">
      <label for="chkOrnate">Ornate</label>
    </div>
    <div class="control-group" id="grpOrnate" style="display:none">
      <label>Finish</label>
      <select id="selOrnate"></select>
    </div>
    <div class="control-group" id="grpOrnateVariant" style="display:none">
      <label>Material</label>
      <select id="selOrnateVariant"></select>
    </div>
  </div>
</header>
<main>
  <div class="tree-panel" id="treePanel">
    <div class="empty-state">Select an item to see its crafting tree.</div>
  </div>
  <div class="summary-panel" id="summaryPanel">
    <h2>Summary</h2>
    <div id="summaryContent"><div class="empty-state" style="font-size:.9rem;margin-top:20px">No item selected.</div></div>
  </div>
</main>

function add(cat, name, props) {
  if(!D[cat]) D[cat]=[];
  props.cat = props.cat||cat;
  D[cat].push({name, ...props});
}

const selType = document.getElementById('selType');
const selCat = document.getElementById('selCategory');
const selItem = document.getElementById('selItem');

const lblQty = document.getElementById('lblQty');

const grpOrnate = document.getElementById('grpOrnate');
const grpJewel = document.getElementById('grpJewel');

// Populate types

function populateCategories() {
  selCat.innerHTML = '';
  const cats = TYPES[selType.value] || [];
  cats.forEach(c => {
    if(!D[c]) return; // skip empty categories
    const o = document.createElement('option');
    o.value = c;
    // Show shorter label (strip type prefix)
    const label = c.replace(/^.*? - /,'').replace(/^.*Items /,'').replace(/^.*Tools /,'');
    o.textContent = c;
    selCat.appendChild(o);
  });
  populateItems();
}

function populateItems() {
  selItem.innerHTML = '';
  const items = D[selCat.value] || [];
  items.forEach((it,idx) => {
    const o = document.createElement('option');
    o.value = idx; o.textContent = it.name;
    selItem.appendChild(o);
  });
  updateUI();
}

function getSelectedDesign() {
  const items = D[selCat.value];
  if(!items) return null;
  return items[selItem.value] || null;
}

function updateUI() {
  const design = getSelectedDesign();
  if(!design) return;

  // Show/hide location label
  lblQty.textContent = design.size === 'loc' ? 'Locations' : 'Quantity';

  // Ornate availability
  const hasOrnate = !!design.ocat && !!ORNATE_DEFS[design.ocat];
  chkOrnate.parentElement.style.display = hasOrnate ? '' : 'none';
  if(!hasOrnate) chkOrnate.checked = false;
  updateOrnateOptions();

  // Jewellery metal
  updateJewelVisibility();

  rebuildTree();
}

function updateOrnateOptions() {
  const design = getSelectedDesign();
  if(!design || !chkOrnate.checked || !design.ocat) {
    grpOrnate.style.display = 'none';
    grpOrnateVariant.style.display = 'none';
    return;
  }
  const defs = ORNATE_DEFS[design.ocat] || [];
  grpOrnate.style.display = '';
  selOrnate.innerHTML = '';
  defs.forEach((d,i) => {
    const o = document.createElement('option');
    o.value = i; o.textContent = d.name;
    selOrnate.appendChild(o);
  });
  grpOrnateVariant.style.display = 'none';
}

function updateJewelVisibility() {
  const design = getSelectedDesign();
  let needsJewel = design && design.jewel;
  if(chkOrnate.checked && design && design.ocat) {
    const defs = ORNATE_DEFS[design.ocat] || [];
    const orn = defs[selOrnate.value];
    if(orn && orn.jewel) needsJewel = true;
  }
  grpJewel.style.display = needsJewel ? '' : 'none';
}

selType.addEventListener('change', populateCategories);
selCat.addEventListener('change', populateItems);
selItem.addEventListener('change', updateUI);
numQty.addEventListener('input', rebuildTree);
chkOrnate.addEventListener('change', () => { updateOrnateOptions(); updateJewelVisibility(); rebuildTree(); });
selOrnate.addEventListener('change', () => { updateJewelVisibility(); rebuildTree(); });
selJewel.addEventListener('change', rebuildTree);
document.getElementById('numWuCost').addEventListener('input', rebuildTree);

// ============================================================
//  TREE COMPUTATION
// ============================================================
function resolveJewel(inputs) {
  const resolved = {};
  const jewelType = selJewel.value;
  for(const [k,v] of Object.entries(inputs)) {
    if(k === '@jewel') resolved[jewelType] = (resolved[jewelType]||0) + v;
    else resolved[k] = (resolved[k]||0) + v;
  }
  return resolved;
}

function buildTree(name, needed) {
  const recipe = MAT[name];
  if(!recipe) {
    // Raw material (leaf node)
    return { name, needed, produced: needed, surplus:0, wu:0, isRaw:true, children:[] };
  }
  const batches = Math.ceil(needed / recipe.y);
  const produced = batches * recipe.y;
  const surplus = produced - needed;
  const wu = recipe.wu * batches;
  const children = [];
  for(const [mat, qtyPer] of Object.entries(recipe.i)) {
    children.push(buildTree(mat, qtyPer * batches));
  }
  return { name, needed, produced, surplus, wu, batches, isRaw:false, children };
}

function buildDesignTree() {
  const design = getSelectedDesign();
  if(!design) return null;

  const qty = Math.max(1, parseInt(numQty.value)||1);
  const itemYield = design.y || 1;
  const batches = Math.ceil(qty / itemYield);
  const produced = batches * itemYield;
  const surplus = produced - qty;

  // Resolve inputs with jewellery metal substitution
  let inputs = resolveJewel(design.i);

  // Scale by batches (and by locations for armour)
  // For per-loc items, qty IS the number of locations
  const scaledInputs = {};
  for(const [k,v] of Object.entries(inputs)) {
    scaledInputs[k] = v * batches;
  }

  // Plate leather (fixed cost)
  if(design.plateLeather && batches > 0) {
    scaledInputs['Leather (O)'] = (scaledInputs['Leather (O)']||0) + 1;
  }

  // Ornate additions
  let ornateWuExtra = 0;
  if(chkOrnate.checked && design.ocat) {
    const defs = ORNATE_DEFS[design.ocat] || [];
    const orn = defs[selOrnate.value];
    if(orn) {
      // WU multiplier applies to the base assembly WU
      const baseWu = design.wu * batches;
      ornateWuExtra = Math.ceil(baseWu * (orn.wuMult - 1));

      // Ornate materials: per location for armour, per item otherwise
      // Large items double ornate materials for clothing/common/weapon
      let ornScale = batches;
      if(design.size === 'l' && (design.ocat === 'clothing' || design.ocat === 'common' || design.ocat === 'weapon')) {
        ornScale = batches * 2;
      }
      const ornInputs = resolveJewel(orn.i);
      for(const [k,v] of Object.entries(ornInputs)) {
        scaledInputs[k] = (scaledInputs[k]||0) + v * ornScale;
      }
    }
  }

  const assemblyWu = design.wu * batches + ornateWuExtra;

  // Build children trees for each input
  const children = [];
  for(const [mat, total] of Object.entries(scaledInputs)) {
    children.push(buildTree(mat, total));
  }

  return {
    name: design.name + (produced > 1 ? '' : ''),
    needed: qty,
    produced,
    surplus,
    wu: assemblyWu,
    isRaw: false,
    isRoot: true,
    children
  };
}

// ============================================================
//  SUMMARY (aggregate raw materials + total WU)
// ============================================================
function collectRaw(node, raws, totalWu, surpluses) {
  totalWu.v += node.wu;
  if(node.isRaw) {
    raws[node.name] = (raws[node.name]||0) + node.needed;
  }
  if(node.surplus > 0) {
    surpluses[node.name] = (surpluses[node.name]||0) + node.surplus;
  }
  for(const c of node.children) collectRaw(c, raws, totalWu, surpluses);
}

function formatCurrency(copper) {
  const g = Math.floor(copper / 16);
  const rem = copper % 16;
  const s = Math.floor(rem / 4);
  const c = rem % 4;
  let parts = [];
  if(g) parts.push(g + 'g');
  if(s) parts.push(s + 's');
  if(c) parts.push(Math.round(c*10)/10 + 'c');
  return parts.join(' ') || '0c';
}

// ============================================================
//  RENDERING
// ============================================================
function renderNode(node, isLast) {
  const div = document.createElement('div');
  div.className = 'tree-node' + (node.isRaw ? ' node-raw' : '') + (node.isRoot ? ' node-root' : '');

  const row = document.createElement('div');
  row.className = 'node-row';

  const qtySpan = document.createElement('span');
  qtySpan.className = 'node-qty';
  qtySpan.textContent = node.needed + '\u00d7';
  row.appendChild(qtySpan);

  const nameSpan = document.createElement('span');
  nameSpan.className = 'node-name';
  nameSpan.textContent = node.name;
  row.appendChild(nameSpan);

  // Rarity tag
  const r = RARITY[node.name];
  if(r) {
    const tag = document.createElement('span');
    tag.className = 'rarity-tag ' + r.toLowerCase();
    tag.textContent = r;
    row.appendChild(tag);
  }

  if(!node.isRaw && node.wu > 0) {
    const wuSpan = document.createElement('span');
    wuSpan.className = 'node-wu';
    wuSpan.textContent = node.wu + ' WU';
    row.appendChild(wuSpan);
  }

  if(node.surplus > 0) {
    const surp = document.createElement('span');
    surp.className = 'node-surplus';
    surp.textContent = '(+' + node.surplus + ' surplus)';
    row.appendChild(surp);
  }

  div.appendChild(row);

  if(node.children.length > 0) {
    const childContainer = document.createElement('div');
    childContainer.className = 'node-children';
    node.children.forEach((c,i) => {
      childContainer.appendChild(renderNode(c, i === node.children.length - 1));
    });
    div.appendChild(childContainer);
  }

  return div;
}

function rebuildTree() {
  const tree = buildDesignTree();
  if(!tree) {
    treePanel.innerHTML = '<div class="empty-state">Select an item to see its crafting tree.</div>';
    summaryContent.innerHTML = '<div class="empty-state" style="font-size:.9rem;margin-top:20px">No item selected.</div>';
    return;
  }

  // Render tree
  treePanel.innerHTML = '';
  const root = document.createElement('div');
  root.className = 'tree-root';
  root.appendChild(renderNode(tree));
  treePanel.appendChild(root);

  // Render summary
  const raws = {};
  const totalWu = {v:0};
  const surpluses = {};
  collectRaw(tree, raws, totalWu, surpluses);

  let html = '<div class="wu-total">' + totalWu.v + ' Total WU</div>';

  // Estimate cost
  let totalCopper = 0;
  let hasUnknown = false;
  for(const [name, qty] of Object.entries(raws)) {
    const r = RARITY[name];
    if(r && PRICE_COPPER[r]) {
      totalCopper += qty * PRICE_COPPER[r];
    } else {
      hasUnknown = true;
    }
  }
  const fmtCost = (copper) => {
    const cg = Math.floor(copper / 16);
    const cs = (copper % 16) / 4;
    let s = '';
    if(cg > 0) s += cg + 'g ';
    s += cs.toFixed(1) + 's';
    const totalSilver = (copper / 4);
    s += ' (' + totalSilver.toFixed(1) + 's)';
    return s;
  };
  html += '<div class="cost-est">Est. material cost: <span>' + fmtCost(totalCopper) + '</span>';
  if(hasUnknown) html += ' <span style="color:#e94560">(+ unknown)</span>';
  html += '</div>';

  // Raw materials list sorted by rarity
  const rarityOrder = {'R':0,'U':1,'C':2,'VC':3};
  const sorted = Object.entries(raws).sort((a,b) => {
    const ra = rarityOrder[RARITY[a[0]]] ?? 2;
    const rb = rarityOrder[RARITY[b[0]]] ?? 2;
    return ra - rb || a[0].localeCompare(b[0]);
  });

  // WU cost estimate
  const wuRate = parseFloat(document.getElementById('numWuCost').value) || 2;
  const wuCopper = totalWu.v * wuRate;
  const totalEstCopper = totalCopper + wuCopper;

  html += '<div class="cost-est">Est. WU cost: <span>' + fmtCost(wuCopper) + '</span> (' + totalWu.v + ' WU @ ' + wuRate + 'c each)</div>';
  html += '<div class="cost-est" style="font-size:1rem;font-weight:700">Total est. cost: <span style="font-size:1.1rem">' + fmtCost(totalEstCopper) + '</span>';
  if(hasUnknown) html += ' <span style="color:#e94560">(+ unknown)</span>';
  html += '</div>';

  html += '<h2 style="margin-top:8px">Raw Materials</h2>';
  for(const [name, qty] of sorted) {
    const r = RARITY[name];
    const rc = r ? 'rarity-' + r.toLowerCase() : '';
    html += '<div class="summary-row"><span class="mat-name ' + rc + '">' + name;
    if(r) html += ' <span class="rarity-tag ' + r.toLowerCase() + '">' + r + '</span>';
    html += '</span><span class="mat-qty">' + qty + '</span></div>';
  }

  // Surplus section
  const surplusEntries = Object.entries(surpluses).sort((a,b) => a[0].localeCompare(b[0]));
  if(surplusEntries.length > 0) {
    html += '<h2 style="margin-top:16px">Surplus Created</h2>';
    for(const [name, qty] of surplusEntries) {
      const r = RARITY[name];
      const rc = r ? 'rarity-' + r.toLowerCase() : '';
      html += '<div class="summary-row"><span class="mat-name ' + rc + '">+' + qty + ' ' + name;
      if(r) html += ' <span class="rarity-tag ' + r.toLowerCase() + '">' + r + '</span>';
      html += '</span></div>';
    }
  }

  summaryContent.innerHTML = html;
}

populateCategories();
